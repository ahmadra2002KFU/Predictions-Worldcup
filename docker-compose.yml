# Production stack. On a VPS run:  docker compose up -d --build
# (docker-compose.override.yml is a LOCAL-DEV-ONLY file — see README/Claude Docs.)
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies migrations, then exits. Built from the `builder` stage so
  # the Prisma CLI is available (the slim runner image doesn't keep it).
  migrate:
    build: { context: ., target: builder }
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db: { condition: service_healthy }
    restart: "no"

  app:
    build: { context: ., target: runner }
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_SECRET: ${ADMIN_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      AI_COMMENTARY_BASE_URL: http://host.docker.internal:8084/v1
      AI_COMMENTARY_MODEL: Qwen3.6-27B-Q4_K_M-mtp.gguf
      TZ: UTC
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate: { condition: service_completed_successfully }
      db: { condition: service_healthy }
    # No host port: only Caddy is exposed to the internet.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
